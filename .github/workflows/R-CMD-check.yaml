---
name: R-CMD-check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest
    container:
      image: rocker/r-ver:4.5.3

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update -qq
          apt-get install -y libcppad-dev libgmp-dev libomp-dev g++ gfortran libcurl4-openssl-dev libuv1-dev
          ln -s /usr/include/cppad /usr/local/include/cppad

      - name: Install R dependencies
        run: |
          apt-get install r-cran-rmarkdown r-cran-matrix r-cran-rcpp r-cran-numderiv r-cran-abind r-cran-datatable
          Rscript -e "install.packages(c('trustOptim','quarto'), repos='https://cloud.r-project.org/')"

#         apt-get isntall r-cran-quarto r-cran-trustoptim
#          Rscript -e "install.packages(c('Matrix', 'Rcpp', 'trustOptim','numDeriv','abind'), repos='https://cloud.r-project.org/')"


      - name: R buld and install
        run: |
          R CMD build --no-build-vignettes adlaplace
          R CMD INSTALL adlaplace*.tar.gz
          R CMD build --no-build-vignettes adlaplaceExample
          R CMD INSTALL adlaplaceExample*.tar.gz

      - name: Run R CMD check
        run: |
          R CMD check --no-manual adlaplace*.tar.gz
          R CMD check --no-manual adlaplaceExample*.tar.gz


