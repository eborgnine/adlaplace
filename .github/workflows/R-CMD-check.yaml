name: R-CMD-check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest
    container: rocker/r2u
    steps:
      - uses: actions/checkout@v4

      # 1. Update apt + install SYSTEM dependencies FIRST
      - name: Install system dependencies
        run: |
          apt-get update -qq
          apt-get install -y \
            r-cran-data.table r-cran-rcpp r-cran-matrix r-cran-numderiv r-cran-abind \
            r-cran-knitr r-cran-rmarkdown r-cran-rcppeigen \
            libcppad-dev libgmp-dev libomp-dev g++ gfortran \
            libcurl4-openssl-dev libuv1-dev

      - name: test data table
        run: |
          R -e "library('data.table')"
