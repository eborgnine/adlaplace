---
name: R-CMD-check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest
    container:
      image: rocker/r-ver:4.5.3

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update -qq
          apt-get install -y libcppad-dev libgmp-dev libomp-dev g++ gfortran libcurl4-openssl-dev
          ln -s /usr/include/cppad /usr/local/include/cppad

      - name: Install R dependencies
        run: |
          Rscript -e "install.packages(c("rmarkdown",'quarto'), repos='https://cloud.r-project.org/')"
          Rscript -e "install.packages(c('Matrix', 'Rcpp', 'trustOptim'), repos='https://cloud.r-project.org/')"

      - name: Run R CMD check
        run: |
          R CMD build --no-build-vignettes adlaplace
          R CMD INSTALL adlaplace*.tar.gz
          R CMD check adlaplace*.tar.gz

