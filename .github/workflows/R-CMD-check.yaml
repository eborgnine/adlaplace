name: R-CMD-check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest
    container: rocker/r2u
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update -qq 
          apt-get install -y \
            --no-install-recommends \
            --no-install-suggests \
            r-cran-abind r-cran-sn \
            r-cran-quarto r-cran-tinytex r-cran-trustoptim \
            r-cran-get r-cran-timedate r-cran-woodburymatrix \
            libcppad-dev libgmp-dev libomp-dev \
            libcurl4-openssl-dev libuv1-dev curl wget

      - name: Set up Quarto
        run: |
          curl -L -o quarto.deb \
            "https://github.com/quarto-dev/quarto-cli/releases/download/v1.5.29/quarto-1.5.29-linux-amd64.deb"
          apt-get install -y ./quarto.deb

      - name: Cache TinyTeX
        uses: actions/cache@v4
        with:
          path: ~/.TinyTeX
          key: tinytex-${{ runner.os }}-${{ hashFiles('**/DESCRIPTION') }}
          restore-keys: |
            tinytex-${{ runner.os }}-

      - name: Install TinyTeX (if not cached)
        run: |
          # Only install if cache missed
          if [ ! -f ~/.TinyTeX/bin/x86_64-linux/pdflatex ]; then
            Rscript -e "install.packages('tinytex', repos = 'https://cloud.r-project.org/')"
            Rscript -e "tinytex::install_tinytex(repository = 'https://ctan.math.illinois.edu/systems/texlive/tlnet')"
            tlmgr install collection-basic collection-latex collection-fontsrecommended preprint 2>/dev/null || true
          fi
          # Always add to PATH (works whether cached or fresh)
          echo "$HOME/.TinyTeX/bin/x86_64-linux" >> $GITHUB_PATH
          
      - name: build
        run: |
          R CMD build adlaplace
          R CMD INSTALL adlaplace_*.gz
          R CMD build adlaplaceExample

      - name: check adlaplace
        run: |
          R CMD check adlaplace_*.gz

      - name: check adlaplaceExample
        run: |
          R CMD check adlaplaceExample*.gz

      - name: build hpolcc
        run: |
          R CMD build hpolcc

      - name: check hpolcc
        run: |
          R CMD check hpolcc*.gz
