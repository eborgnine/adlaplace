name: R-CMD-check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest
    container: rocker/r2u
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update -qq 
          apt-get install -y \
            r-cran-data.table r-cran-numderiv r-cran-abind \
            r-cran-quarto r-cran-rcpp r-cran-trustoptim \
            libcppad-dev libgmp-dev libomp-dev \
            libcurl4-openssl-dev libuv1-dev curl wget

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.5.29"  # ← Pin to a known version (no API call → no jq needed)
          tinytex: false

      - name: test data table
        run: |
          find /usr -name cppad.hpp
          R -e "library('data.table')"

      - name: build
        run: |
          R CMD build adlaplace
          R CMD build adlaplaceExample

      - name: check adlaplace
        run: |
          R CMD check adlaplace*.gz

      - name: check adlaplaceExample
        run: |
          R CMD check adlaplaceExample*.gz
