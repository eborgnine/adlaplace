name: R-CMD-check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest
    container: rocker/r2u
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update -qq 
          apt-get install -y \
            --no-install-recommends \
            --no-install-suggests \
            r-cran-abind r-cran-sn \
            r-cran-data.table r-cran-trustoptim \
            r-cran-get r-cran-timedate r-cran-woodburymatrix \
            r-cran-quarto r-cran-tinytex \
            libcppad-dev libgmp-dev libomp-dev \
            libcurl4-openssl-dev libuv1-dev curl wget


      - name: Install TinyTeX (if not cached)
        env:
          TEXLIVE_MIRROR: https://ctan.mirror.rafal.ca/systems/texlive/tlnet
        run: |
          if [ ! -f ~/.TinyTeX/bin/x86_64-linux/pdflatex ]; then
            Rscript -e "install.packages('tinytex', repos = 'https://cloud.r-project.org/')"
            Rscript -e "tinytex::install_tinytex(repository = '$TEXLIVE_MIRROR')"
            tlmgr install --repository=$TEXLIVE_MIRROR \
              collection-basic collection-latex \
              collection-fontsrecommended collection-fontsextra cm-super \
              lmodern courier ae aecompl \
              preprint 2>/dev/null || true
          fi
          echo "$HOME/.TinyTeX/bin/x86_64-linux" >> $GITHUB_PATH

      - name: Check1 for pcrr8t.tfm
        run: |
          echo "Searching for pcrr8t.tfm in TinyTeX..."
          find ~/.TinyTeX -name "pcrr8t.tfm"
          find ~/ -name "pcrr8t.tfm"
          find /usr -name "pcrr8t.tfm"

      - name: Reinstall courier package with updated mirror
        env:
          TEXLIVE_MIRROR: https://ctan.mirror.rafal.ca/systems/texlive/tlnet
        run: |
          tlmgr install --repository=$TEXLIVE_MIRROR --reinstall courier
          updmap-sys

      - name: Check for pcrr8t.tfm
        run: |
          echo "Searching for pcrr8t.tfm in TinyTeX..."
          find ~/.TinyTeX -name "pcrr8t.tfm"
          find ~/ -name "pcrr8t.tfm"
          find /usr -name "pcrr8t.tfm"

      - name: Cache Quarto installer
        uses: actions/cache@v4
        with:
          path: /tmp/quarto.deb
          key: quarto-deb-1.5.29-linux-amd64
          restore-keys: quarto-deb-

      - name: Set up Quarto CLI
        run: |
          # Only download if not cached
          if [ ! -f /tmp/quarto.deb ]; then
            curl -L -o /tmp/quarto.deb \
              "https://github.com/quarto-dev/quarto-cli/releases/download/v1.5.29/quarto-1.5.29-linux-amd64.deb"
          fi
          
          # Install (fast if already installed, or installs on first run)
          dpkg -i /tmp/quarto.deb || apt-get install -f -y  # Fix deps if needed
          
          # Verify
          quarto --version


      - name: build
        run: |
          R CMD build adlaplace
          R CMD INSTALL adlaplace_*.gz

      - name: check adlaplace
        run: |
          R CMD check adlaplace_*.gz

      - name: Upload R CMD check logs
        uses: actions/upload-artifact@v4
        with:
          name: adlaplace-check-logs
          path: adlaplace.Rcheck/
          retention-days: 7

      - name: build adlaplaceExample
        run: |
          R CMD build adlaplaceExample

      - name: check adlaplaceExample
        run: |
          R CMD check adlaplaceExample_*.gz

      - name: build hpolcc
        run: |
          R CMD build hpolcc

      - name: check hpolcc
        run: |
          R CMD check hpolcc_*.gz
