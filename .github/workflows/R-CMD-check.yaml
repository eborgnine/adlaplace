name: R-CMD-check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
   R-CMD-check:
    runs-on: ubuntu-latest
    container: ghcr.io/r-universe-org/base-image:latest  # ✅ Has TinyTeX + Quarto pre-installed

    steps:
      - uses: actions/checkout@v4

      # ✅ Install ONLY what's NOT pre-installed (CppAD + niche R packages)
      - name: Install missing dependencies
        run: |
          apt-get update -qq
          apt-get install -y \
            libcppad-dev libgmp-dev libomp-dev r-cran-data.table

      - name: Rebuild ABI-mismatched R packages
        run: |
          R -e "install.packages(
          c('Rcpp', 'cli',  'xfun'), 
          repos = 'https://cloud.r-project.org/', 
          type = 'source',
          dependencies = FALSE)"

      - name: install R dependencies
        run: |
          R -e "install.packages(c('GET','WoodburyMatrix', 'trustOptim', 'quarto'))"

      - name: Verify Quarto CLI
        run: quarto --version

      - name: show dependencies
        run: |
          R -e "library('quarto')"
          R -e "library('data.table')"

      - name: build
        run: |
          R CMD build adlaplace
          R CMD INSTALL adlaplace_*.gz
          R CMD build adlaplaceExample

      - name: check adlaplace
        run: |
          R CMD check adlaplace_*.gz

      - name: check adlaplaceExample
        run: |
          R CMD check adlaplaceExample*.gz

      - name: build hpolcc
        run: |
          R CMD build hpolcc

      - name: check hpolcc
        run: |
          R CMD check hpolcc*.gz
