name: R-CMD-check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest
    container: rocker/r2u
    steps:
      - uses: actions/checkout@v4

      # 1. Update apt + install SYSTEM dependencies FIRST
      - name: Install system dependencies
        run: |
          apt-get update -qq
          apt-get install -y \
            r2u-data.table r2u-rcpp r2u-matrix r2u-numderiv r2u-abind \
            r2u-knitr r2u-rmarkdown r2u-rcppeigen \
            libcppad-dev libgmp-dev libomp-dev g++ gfortran \
            libcurl4-openssl-dev libuv1-dev

      - name: test data table
        run: |
          R -e "library('data.table')"
